name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      working-directory: ./mobile
      run: flutter pub get
        
    - name: Analyze code
      working-directory: ./mobile
      run: flutter analyze
      
    - name: Run tests
      working-directory: ./mobile
      run: flutter test
