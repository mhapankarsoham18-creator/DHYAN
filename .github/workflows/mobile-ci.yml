name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile_app/**'
  pull_request:
    branches: [main]
    paths:
      - 'mobile_app/**'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Generate mock env assets
        run: touch .env.development .env.production

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
