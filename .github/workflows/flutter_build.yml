name: Flutter Android / iOS Release Builds

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch: # Enable manual triggers

jobs:
  build_android:
    name: Build Android AppBundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: ./mobile_app
        run: flutter pub get

      - name: Create Firebase Config (Dummy in CI)
        working-directory: ./mobile_app
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json

      - name: Setup Android Keystore
        working-directory: ./mobile_app
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build Android AAB
        working-directory: ./mobile_app
        run: flutter build appbundle --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: mobile_app/build/app/outputs/bundle/release/app-release.aab

  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup iOS Certificates & Profiles (Fastlane Match)
        working-directory: ./mobile_app/ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          gem install fastlane
          # fastlane match appstore --readonly

      - name: Get Flutter dependencies
        working-directory: ./mobile_app
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ./mobile_app/ios
        run: pod install

      - name: Build iOS IPA
        working-directory: ./mobile_app
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: mobile_app/build/ios/ipa/*.ipa
